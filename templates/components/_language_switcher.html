{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<form action="{% url 'set_language' %}" method="post" class="inline-flex items-center space-x-2">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.path }}">
    {% get_available_languages as LANGUAGES %}
    {% for lang_code, lang_name in LANGUAGES %}
        {% if lang_code != CURRENT_LANGUAGE %}
            <button type="submit" name="language" value="{{ lang_code }}"
                    class="text-xs uppercase tracking-widest font-medium text-[#999999] hover:text-green transition">
                {{ lang_code }}
            </button>
        {% else %}
            <span class="text-xs uppercase tracking-widest font-semibold text-[#2D2D2D]">{{ lang_code }}</span>
        {% endif %}
        {% if not forloop.last %}<span class="text-gray-300">|</span>{% endif %}
    {% endfor %}
</form>
