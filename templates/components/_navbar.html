{% load i18n static %}
<header class="bg-white sticky top-0 z-50 border-b border-[#E5E5E5]" x-data="{ mobileOpen: false }">
    <nav class="px-4 py-3">
        <div class="flex items-center justify-between">
            <a href="{% url 'home' %}" class="flex items-center gap-3">
                <img src="{% static 'images/logo_ep.png' %}" alt="{{ site_settings.site_title }}" class="header-logo header-logo-dark">
                <div class="header-brand hidden lg:block">
                    <div class="header-brand-name" style="color: #000;">EKATERINA&nbsp;PROKOFIEVA</div>
                    <div class="header-brand-title" style="color: #000;">&mdash;&nbsp;LANDSCAPE&nbsp;ARCHITECT</div>
                </div>
            </a>
            <div class="hidden lg:flex items-center gap-14">
                <a href="{% url 'home' %}#about" class="header-nav-link" style="color: #000;">обо&nbsp;мне</a>
                <a href="{% url 'portfolio:project_list' %}" class="header-nav-link" style="color: #000;">проекты</a>
            </div>
            <button @click="mobileOpen = !mobileOpen" class="lg:hidden p-2" aria-label="Menu">
                <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path x-show="!mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
                    <path x-show="mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <!-- Mobile menu -->
        <div x-show="mobileOpen" x-transition class="lg:hidden pt-4 pb-2 space-y-3 text-right">
            <a href="{% url 'home' %}#about" class="block header-nav-link" style="color: #000;">обо&nbsp;мне</a>
            <a href="{% url 'portfolio:project_list' %}" class="block header-nav-link" style="color: #000;">проекты</a>
        </div>
    </nav>
</header>
