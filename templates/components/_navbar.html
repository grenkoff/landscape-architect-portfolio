{% load i18n %}
<header x-data="{ mobileOpen: false }" class="bg-sage-900 text-white sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo / Site Title -->
            <a href="{% url 'home' %}" class="font-heading text-xl font-semibold tracking-wide hover:text-sage-300 transition">
                {{ site_settings.site_title }}
            </a>

            <!-- Desktop nav -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="{% url 'home' %}" class="hover:text-sage-300 transition">{% trans "Home" %}</a>
                <a href="{% url 'portfolio:project_list' %}" class="hover:text-sage-300 transition">{% trans "Portfolio" %}</a>
                <a href="{% url 'home' %}#contacts" class="hover:text-sage-300 transition">{% trans "Contacts" %}</a>

                {% include "components/_language_switcher.html" %}
            </div>

            <!-- Mobile menu button -->
            <button @click="mobileOpen = !mobileOpen" class="md:hidden p-2" aria-label="Menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path x-show="!mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    <path x-show="mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Mobile nav -->
        <div x-show="mobileOpen" x-transition class="md:hidden pb-4 space-y-2">
            <a href="{% url 'home' %}" class="block py-2 hover:text-sage-300 transition">{% trans "Home" %}</a>
            <a href="{% url 'portfolio:project_list' %}" class="block py-2 hover:text-sage-300 transition">{% trans "Portfolio" %}</a>
            <a href="{% url 'home' %}#contacts" class="block py-2 hover:text-sage-300 transition">{% trans "Contacts" %}</a>
            <div class="pt-2">
                {% include "components/_language_switcher.html" %}
            </div>
        </div>
    </nav>
</header>
